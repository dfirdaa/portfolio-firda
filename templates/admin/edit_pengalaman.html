<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Pengalaman</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="admin-dashboard">

    <aside class="admin-sidebar">

        <div class="admin-logo">
            🌸
            <h2>Admin Panel</h2>
        </div>

        <ul class="admin-menu">
            <li><a href="{{ url_for('admin') }}">Dashboard</a></li>
            <li><a href="{{ url_for('admin_profil') }}">Profil</a></li>
            <li><a href="{{ url_for('admin_skill') }}">Skill</a></li>
            <li class="active"><a href="{{ url_for('admin_pengalaman') }}">Pengalaman</a></li>
            <li><a href="{{ url_for('admin_proyek') }}">Proyek</a></li>
            <li><a href="{{ url_for('admin_kontak') }}">Kontak</a></li>
            <li class="logout"><a href="{{ url_for('logout') }}">Logout</a></li>
        </ul>

    </aside>

    <main class="admin-content">

        <div class="admin-header">
            <div>
                <h1>Edit Pengalaman</h1>
                <p>Ubah data pengalaman yang tersimpan di TiDB.</p>
            </div>

            <div class="admin-profile">
                <span>Firda Amalia</span>
                <div class="admin-avatar">F</div>
            </div>
        </div>

        <div class="admin-form-box">

            <h2>Form Edit Pengalaman</h2>

            <form method="POST"
                  action="{{ url_for('edit_pengalaman', id=pengalaman.id) }}">

                <div class="form-group">
                    <label>Jabatan / Kegiatan</label>
                    <input type="text"
                           name="jabatan"
                           value="{{ pengalaman.jabatan }}"
                           required>
                </div>

                <div class="form-group">
                    <label>Instansi</label>
                    <input type="text"
                           name="instansi"
                           value="{{ pengalaman.instansi }}"
                           required>
                </div>

                <div class="form-group">
                    <label>Tahun</label>
                    <input type="text"
                           name="tahun"
                           value="{{ pengalaman.tahun }}"
                           required>
                </div>

                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea name="deskripsi"
                              rows="5"
                              required>{{ pengalaman.deskripsi }}</textarea>
                </div>

                <button type="submit">
                    Simpan Perubahan
                </button>

                <a href="{{ url_for('admin_pengalaman') }}"
                   class="btn-back">
                    Kembali
                </a>

            </form>

        </div>

    </main>

</div>

</body>
</html>
