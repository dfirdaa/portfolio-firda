<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Proyek</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="admin-dashboard">

    <aside class="admin-sidebar">

        <div class="admin-logo">
            🌸
            <h2>Admin Panel</h2>
        </div>

        <ul class="admin-menu">
            <li>
                <a href="{{ url_for('admin') }}">Dashboard</a>
            </li>

            <li>
                 <a href="{{ url_for('admin_profil') }}">Profil</a>

            </li>

            <li>
                <a href="{{ url_for('admin_skill') }}">Skill</a>
            </li>

            <li>
                <a href="{{ url_for('admin_pengalaman') }}">Pengalaman</a>
            </li>

            <li class="active">
                <a href="{{ url_for('admin_proyek') }}">Proyek</a>
            </li>

            <li>
                <a href="{{ url_for('admin_kontak') }}">Kontak</a>
            </li>

            <li class="logout">
                <a href="{{ url_for('logout') }}">Logout</a>
            </li>
        </ul>

    </aside>

    <main class="admin-content">

        <div class="admin-header">
            <div>
                <h1>Edit Proyek</h1>
                <p>Ubah data proyek yang tersimpan di TiDB.</p>
            </div>

            <div class="admin-profile">
                <span>Firda Amalia</span>
                <div class="admin-avatar">F</div>
            </div>
        </div>

        <div class="admin-form-box">

            <h2>Form Edit Proyek</h2>

            <form method="POST"
                action="{{ url_for('edit_proyek', id=proyek.id) }}"
                enctype="multipart/form-data">

                <div class="form-group">
                    <label>Nama Proyek</label>
                    <input type="text"
                           name="nama_proyek"
                           value="{{ proyek.nama_proyek }}"
                           required>
                </div>

                {% if proyek.gambar %}
                <div class="form-group">
                    <label>Gambar Saat Ini</label>
                    <br>
                    <img src="{{ proyek.gambar }}"
                        alt="Gambar Proyek"
                        width="150"
                        style="border-radius: 10px; margin-top: 10px;">
                </div>
                {% endif %}

                <div class="form-group">
                    <label>Upload Gambar Baru</label>
                    <input type="file"
                        name="gambar_file"
                        accept="image/*">
                </div>

                <div class="form-group">
                    <label>Link Gambar</label>
                    <input type="text"
                        name="gambar"
                        value="{{ proyek.gambar or '' }}"
                        placeholder="Opsional, isi jika tidak upload gambar baru">
                </div>

                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea name="deskripsi"
                              rows="5"
                              required>{{ proyek.deskripsi }}</textarea>
                </div>

                <div class="form-group">
                    <label>Teknologi</label>
                    <input type="text"
                           name="teknologi"
                           value="{{ proyek.teknologi }}"
                           required>
                </div>

                <button type="submit">
                    Simpan Perubahan
                </button>

                <a href="{{ url_for('admin_proyek') }}"
                   class="btn-back">
                    Kembali
                </a>

            </form>

        </div>

    </main>

</div>

</body>
</html>
